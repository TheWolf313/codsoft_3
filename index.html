<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator Web App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app" aria-label="Calculator Application">
      <section class="calculator" aria-label="Calculator">
        <header class="display" aria-live="polite">
          <p id="expression" class="expression">0</p>
          <p id="result" class="result">0</p>
        </header>

        <section class="calculator-buttons" aria-label="Calculator Buttons">
          <button class="btn btn-danger" data-action="clear">C</button>
          <button class="btn btn-danger" data-action="delete">DEL</button>
          <button class="btn btn-operator" data-value="/">/</button>
          <button class="btn btn-operator" data-value="*">*</button>

          <button class="btn btn-number" data-value="7">7</button>
          <button class="btn btn-number" data-value="8">8</button>
          <button class="btn btn-number" data-value="9">9</button>
          <button class="btn btn-operator" data-value="-">-</button>

          <button class="btn btn-number" data-value="4">4</button>
          <button class="btn btn-number" data-value="5">5</button>
          <button class="btn btn-number" data-value="6">6</button>
          <button class="btn btn-operator" data-value="+">+</button>

          <button class="btn btn-number" data-value="1">1</button>
          <button class="btn btn-number" data-value="2">2</button>
          <button class="btn btn-number" data-value="3">3</button>
          <button class="btn btn-equals equals-tall" data-action="equals">=</button>

          <button class="btn btn-number zero" data-value="0">0</button>
          <button class="btn btn-number" data-value=".">.</button>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
